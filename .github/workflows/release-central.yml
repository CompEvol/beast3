name: Release to Maven Central

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Azul Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Set release version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Publishing version: $VERSION"
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Install beagle.jar to local Maven repo
        run: >
          mvn install:install-file
          -Dfile=lib/beagle.jar
          -DgroupId=io.github.compevol
          -DartifactId=beagle
          -Dversion=1.0
          -Dpackaging=jar

      - name: Install colt.jar to local Maven repo
        run: >
          mvn install:install-file
          -Dfile=lib/colt.jar
          -DgroupId=io.github.compevol
          -DartifactId=colt
          -Dversion=1.0
          -Dpackaging=jar

      - name: Build, sign, and publish to Maven Central
        run: >
          mvn deploy -Prelease
          -Dgpg.passphrase="${GPG_PASSPHRASE}"
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
