name: Release Bundles

# Triggered manually only: GitHub Actions UI → Release Bundles → Run workflow.
#
# Produces three platform bundles:
#   BEAST.v<ver>.Linux.x86.tgz
#   BEAST.v<ver>.Linux.aarch64.tgz
#   BEAST.v<ver>.Windows.zip
#
# Each job builds, stages, and bundles independently on its own native OS
# runner with no shared artifacts between jobs.  The platform-specific
# assemble-bundle.sh handles the full pipeline:
#   stage JARs → jpackage → patch BEAST.cfg → assemble bundle
#
# The Mac DMG is built and signed locally via release/Mac/build-sign-dmg.sh.
#
# NOTE: The aarch64 job uses ubuntu-24.04-arm (GitHub-hosted ARM64 runner).
# For private/enterprise repos this may require a paid plan; substitute a
# self-hosted ARM64 runner label if needed.

on:
  workflow_dispatch:

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Linux x86 bundle — runs natively on ubuntu-latest (x86_64).
  # assemble-bundle.sh detects x86_64 and keeps only javafx-*-linux.jar.
  # ────────────────────────────────────────────────────────────────────────────
  linux-x86:
    name: Linux x86 Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'
          cache: maven

      - name: Resolve version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
                      | sed 's/-SNAPSHOT//')
          echo "Resolved version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn clean package -DskipTests -q

      - name: Build bundle
        run: bash release/Linux/assemble-bundle.sh "$VERSION"

      - name: Create tgz
        run: |
          cd dist
          tar -czf "BEAST.v${VERSION}.Linux.x86.tgz" "BEAST.v${VERSION}"
          ls -lh "BEAST.v${VERSION}.Linux.x86.tgz"

      - uses: actions/upload-artifact@v4
        with:
          name: Linux.x86
          path: dist/BEAST.v${{ env.VERSION }}.Linux.x86.tgz

  # ────────────────────────────────────────────────────────────────────────────
  # Linux aarch64 bundle — runs natively on ubuntu-24.04-arm (ARM64).
  # assemble-bundle.sh detects aarch64 and keeps only javafx-*-linux-aarch64.jar.
  # ────────────────────────────────────────────────────────────────────────────
  linux-aarch64:
    name: Linux aarch64 Bundle
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'
          cache: maven

      - name: Resolve version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
                      | sed 's/-SNAPSHOT//')
          echo "Resolved version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn clean package -DskipTests -q

      - name: Build bundle
        run: bash release/Linux/assemble-bundle.sh "$VERSION"

      - name: Create tgz
        run: |
          cd dist
          tar -czf "BEAST.v${VERSION}.Linux.aarch64.tgz" "BEAST.v${VERSION}"
          ls -lh "BEAST.v${VERSION}.Linux.aarch64.tgz"

      - uses: actions/upload-artifact@v4
        with:
          name: Linux.aarch64
          path: dist/BEAST.v${{ env.VERSION }}.Linux.aarch64.tgz

  # ────────────────────────────────────────────────────────────────────────────
  # Windows bundle — runs natively on windows-latest.
  # assemble-bundle.sh keeps only javafx-*-win.jar classifier JARs.
  # shell: bash uses Git Bash (bundled with Git for Windows).
  # Produces BEAST.v<ver>.Windows.zip containing:
  #   BEAST/BEAST.exe   ← jpackage native launcher
  #   BEAST/app/        ← JARs on the module-path
  #   BEAST/runtime/    ← bundled JRE
  #   bat/              ← batch wrappers for BEAUti, TreeAnnotator, etc.
  #   examples/
  #   README.txt / LICENSE.txt
  # ────────────────────────────────────────────────────────────────────────────
  windows:
    name: Windows Bundle
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'
          cache: maven

      - name: Resolve version
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
                      | sed 's/-SNAPSHOT//')
          echo "Resolved version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        shell: bash
        run: mvn clean package -DskipTests -q

      - name: Build bundle
        shell: bash
        run: bash release/Windows/assemble-bundle.sh "$VERSION"

      - name: Create zip
        shell: pwsh
        run: |
          $src = "dist\BEAST.v$env:VERSION"
          $dst = "dist\BEAST.v$env:VERSION.Windows.zip"
          Compress-Archive -Path $src -DestinationPath $dst -CompressionLevel Optimal
          $item = Get-Item $dst
          Write-Host "$($item.Name)  $([math]::Round($item.Length / 1MB, 1)) MB"

      - uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: dist/BEAST.v${{ env.VERSION }}.Windows.zip
