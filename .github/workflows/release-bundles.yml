name: Release Bundles

# Triggered manually only: GitHub Actions UI → Release Bundles → Run workflow.
#
# Produces platform bundles for Linux x86_64, Linux aarch64, and Windows x86_64,
# each assembled on its own native OS runner so the bundled JRE+FX and JavaFX native
# libs are correct for that platform.
#
# Each job:
#   1. Installs Zulu JDK+FX 25 for the Maven build, then Zulu JRE+FX 25 as the bundle JRE
#   2. Strips -SNAPSHOT from the version, then runs mvn clean package
#   3. Calls <Platform>/assemble-bundle.sh with explicit env vars:
#        OS_ARCH, JRE_DIR ($JAVA_HOME), DEST
#      VERSION comes from $GITHUB_ENV (set by "Resolve version" step).
#      REPO_ROOT is auto-detected by the script from its own location.
#      assemble-bundle.sh assembles, verifies (OS/arch + JavaFX libs), and packages.
#   4. Uploads the archive produced by assemble-bundle.sh
#
# Linux/aarch64: tgz  Windows: zip  (Mac DMG: built locally via Mac/build-sign-dmg.sh)

on:
  workflow_dispatch:

jobs:

  # ── Linux x86_64 bundle ───────────────────────────────────────────────────────
  # Runs natively on ubuntu-latest (x86_64). First setup-java installs Zulu JDK+FX 25
  # for the Maven build; second installs Zulu JRE+FX 25 — its JAVA_HOME is passed as
  # JRE_DIR so the bundle ships the smaller JRE.  Output: BEAST.v<ver>.Linux.x86_64.tgz
  linux-x86_64:
    name: Linux x86_64 Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          java-package: jdk+fx
          cache: maven

      - name: Resolve version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
                      | sed 's/-SNAPSHOT//')
          echo "Resolved version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn clean package -DskipTests -q

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          java-package: jre+fx

      - name: Assemble Linux x86_64 bundle
        run: |
          OS_ARCH="Linux.x86_64"        \
          JRE_DIR="$JAVA_HOME"          \
          DEST="$GITHUB_WORKSPACE/dist" \
          bash release/Linux/assemble-bundle.sh

      - uses: actions/upload-artifact@v7
        with:
          name: Linux.x86_64
          path: dist/BEAST.v${{ env.VERSION }}.Linux.x86_64.tgz
          archive: false  # Disables the internal zipping architecture entirely

  # ── Linux aarch64 bundle ──────────────────────────────────────────────────────
  # Runs natively on ubuntu-24.04-arm (ARM64). Same two-setup-java pipeline as x86_64:
  # JDK+FX 25 for Maven build, then JRE+FX 25 as JRE_DIR for the bundle.
  # Output: BEAST.v<ver>.Linux.aarch64.tgz
  linux-aarch64:
    name: Linux aarch64 Bundle
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          java-package: jdk+fx
          cache: maven

      - name: Resolve version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
                      | sed 's/-SNAPSHOT//')
          echo "Resolved version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn clean package -DskipTests -q

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          java-package: jre+fx

      - name: Assemble Linux aarch64 bundle
        run: |
          OS_ARCH="Linux.aarch64"       \
          JRE_DIR="$JAVA_HOME"          \
          DEST="$GITHUB_WORKSPACE/dist" \
          bash release/Linux/assemble-bundle.sh

      - uses: actions/upload-artifact@v7
        with:
          name: Linux.aarch64
          path: dist/BEAST.v${{ env.VERSION }}.Linux.aarch64.tgz
          archive: false  # Disables the internal zipping architecture entirely

  # ── Windows x86_64 bundle ─────────────────────────────────────────────────────
  # Runs on windows-latest (x86_64). Same two-setup-java pipeline as Linux: JDK+FX 25
  # for Maven build + jpackage (from PATH), then JRE+FX 25 as JRE_DIR
  # (passed via --runtime-image to jpackage).  Output: BEAST.v<ver>.Windows.x86_64.zip
  windows:
    name: Windows x86_64 Bundle
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          java-package: jdk+fx
          cache: maven

      - name: Resolve version
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
                      | sed 's/-SNAPSHOT//')
          echo "Resolved version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        shell: bash
        run: mvn clean package -DskipTests -q

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          java-package: jre+fx

      - name: Assemble Windows x86_64 bundle
        shell: bash
        run: |
          OS_ARCH="Windows.x86_64"      \
          JRE_DIR="$JAVA_HOME"          \
          DEST="$GITHUB_WORKSPACE/dist" \
          bash release/Windows/assemble-bundle.sh

      - uses: actions/upload-artifact@v7
        with:
          name: Windows.x86_64
          path: dist/BEAST.v${{ env.VERSION }}.Windows.x86_64.zip
          archive: false  # Disables the internal zipping architecture entirely
