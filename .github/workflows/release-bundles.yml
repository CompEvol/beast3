name: Release Bundles

# Triggered manually only: GitHub Actions UI → Release Bundles → Run workflow.
#
# Produces two Linux platform bundles (x86_64 and aarch64), each assembled on
# its own native OS runner so the bundled JDK and JavaFX native libs are
# correct for that platform.
#
# Each job:
#   1. Installs Zulu FX JDK 25 (includes JavaFX as platform modules in lib/modules)
#   2. Strips -SNAPSHOT from the version, then runs mvn clean package
#   3. Calls Linux/assemble-bundle.sh with explicit env vars:
#        VERSION, OS_ARCH, JDK_DIR ($JAVA_HOME), DEST, REPO_ROOT
#   4. Validates the bundled JDK binary with `file` to confirm OS and architecture
#   5. Validates that JavaFX native libs (.so) are present in the bundled JDK
#   6. Uploads the tgz produced by assemble-bundle.sh
#
# The Mac DMG is built and signed locally via release/Mac/build-sign-dmg.sh.
# The Windows bundle is not yet implemented — see the commented-out job below.

on:
  workflow_dispatch:

jobs:

  # ── Linux x86_64 bundle ───────────────────────────────────────────────────────
  # Runs natively on ubuntu-latest (x86_64). setup-java installs Zulu FX JDK 25
  # with JavaFX baked in; JAVA_HOME is used as JDK_DIR so the bundle ships that
  # exact JDK.  Output: BEAST.v<ver>.Linux.x86_64.tgz
  linux-x86_64:
    name: Linux x86_64 Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'
          java-package: jdk+fx
          cache: maven

      - name: Resolve version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
                      | sed 's/-SNAPSHOT//')
          echo "Resolved version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build (skip tests)
        run: mvn clean package -DskipTests -q

      - name: Assemble Linux x86_64 bundle
        run: |
          VERSION="$VERSION"                  \
          OS_ARCH="Linux.x86_64"              \
          JDK_DIR="$JAVA_HOME"                \
          DEST="$GITHUB_WORKSPACE/dist"       \
          REPO_ROOT="$GITHUB_WORKSPACE"       \
          bash release/Linux/assemble-bundle.sh

      - name: Validate bundled JDK (OS + JavaFX)
        run: |
          BUNDLE="$GITHUB_WORKSPACE/dist/BEAST.v${VERSION}"
          JAVA_BIN="$BUNDLE/jdk/bin/java"

          # Confirm the java binary is Linux x86-64
          FILE_OUT=$(file "$JAVA_BIN")
          echo "java binary: $FILE_OUT"
          if ! echo "$FILE_OUT" | grep -qE "ELF.*x86-64"; then
            echo "ERROR: bundled JDK is not Linux x86-64 — got: $FILE_OUT"
            exit 1
          fi

          # Confirm JavaFX native libs are present and Linux (.so, not .dylib/.dll)
          FX_LIBS=$(find "$BUNDLE/jdk/lib" -name "libjavafx*.so" 2>/dev/null)
          if [ -z "$FX_LIBS" ]; then
            echo "ERROR: no JavaFX native libs (libjavafx*.so) found in bundled JDK"
            exit 1
          fi
          if find "$BUNDLE/jdk/lib" -name "libjavafx*.dylib" | grep -q .; then
            echo "ERROR: JavaFX libs are macOS (.dylib) — bundled JDK is the wrong platform"
            exit 1
          fi
          echo "JavaFX native libs OK:"
          echo "$FX_LIBS"

      - uses: actions/upload-artifact@v4
        with:
          name: Linux.x86_64
          path: dist/BEAST.v${{ env.VERSION }}.Linux.x86_64.tgz

